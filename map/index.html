<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<title>gavart.ist/map</title>
	<meta name="description" content="" />
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<!-- <script src="https://cdn.maptiler.com/maplibre-gl-js/v2.1.1/maplibre-gl.js"></script> -->
	<!-- https://maplibre.org/maplibre-gl-js-docs/api/map/ -->
	<script src="https://unpkg.com/maplibre-gl@2.1.6/dist/maplibre-gl.js"></script>
	<link href="https://cdn.maptiler.com/maplibre-gl-js/v2.1.1/maplibre-gl.css" rel="stylesheet" />	
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans&family=Noto+Sans+SC:wght@100;300;400;500&display=swap" rel="stylesheet"> 
	<style>
		#map { position: absolute; top: 0; bottom: 0; left: 0; width: 100%; }
	</style>
</head>

<body>
<div id="map"></div>
<script type="text/javascript">

	maplibregl.setRTLTextPlugin(
		'https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-rtl-text/v0.2.3/mapbox-gl-rtl-text.js',
		null,
		true // Lazy load the plugin
	);

	var map = new maplibregl.Map({
		container: "map",
		style: "https://api.maptiler.com/maps/voyager/style.json?key=LItPegLLkWPvaA6LSosX",
		center: [-55, 40],
		zoom: 2,
		localIdeographFontFamily: "'Noto Sans', 'Noto Sans SC', sans-serif"
	});

	// var berlin = new maplibregl.Marker()
	// 	.setLngLat([13.40, 52.52])
	// 	.addTo(map);
	var berkeley = new maplibregl.Marker({
		color: '#8a98ff'
		}).setLngLat([-122.272778, 37.871667])
		.addTo(map);
	var coralGables = new maplibregl.Marker({
		color: '#8a98ff'
		}).setLngLat([-80.272222, 25.716667])
		.addTo(map);
	var houston = new maplibregl.Marker({
		color: '#8a98ff'
		}).setLngLat([-95.383056, 29.762778])
		.addTo(map);
	var farmingtonHills = new maplibregl.Marker({
		color: '#8a98ff'
		}).setLngLat([-83.37694, 42.485278])
		.addTo(map);
	var islaVista = new maplibregl.Marker({
		color: '#8a98ff'
		}).setLngLat([-119.860833, 34.413333, ])
		.addTo(map);
	// var linz = new maplibregl.Marker()
	// 	.setLngLat([14.28, 48.30])
	// 	.addTo(map);
	var losAngeles = new maplibregl.Marker({
		color: '#8a98ff'
		}).setLngLat([-118.24, 34.05])
		.addTo(map);
	var merida = new maplibregl.Marker({
		color: '#7897f3'
		}).setLngLat([-89.62, 20.97])
		.addTo(map);
	// var reykjavik = new maplibregl.Marker()
	// 	.setLngLat([-21.82, 64.12])
	// 	.addTo(map);
	// var tokyo = new maplibregl.Marker()
	// 	.setLngLat([139.83, 35.65])
	// 	.addTo(map);
	var wimbeldon = new maplibregl.Marker({
		color: '#8a98ff'
		}).setLngLat([-0.208, 51.422])
		.addTo(map);
	map.scrollZoom.disable();
	map.touchZoomRotate.disableRotation();
	//map.scrollZoom.setZoomRate(1/300);  
</script>
	
</body>
</html>
